---

- name: Installation de la base de données MySQL
  hosts: database
  become: true
  roles:
    - { role: database, tags: ["database"] }

- name: Installation du serveur applicatif (runtime + FastAPI)
  hosts: api
  become: true
  roles:
    - { role: runtime, tags: ["runtime"] }
    - { role: app, tags: ["app"] }

- name: Installation de nginx (reverse proxy)
  hosts: nginx
  become: true
  roles:
    - { role: geerlingguy.nginx, tags: ["nginx"] }
    - { role: webserver, tags: ["webserver"] }
