---

- name: Install MySQL client libraries for Ansible
  ansible.builtin.apt:
    name:
      - python3-pymysql
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Ensure application database exists
  community.mysql.mysql_db:
    name: "{{ database_app_name }}"
    state: present
    login_unix_socket: /var/run/mysqld/mysqld.sock

- name: Ensure application database user exists
  community.mysql.mysql_user:
    name: "{{ database_app_user }}"
    password: "{{ database_app_password }}"
    host: "{{ database_app_host }}"
    priv: "{{ database_app_name }}.*:ALL"
    state: present
    login_unix_socket: /var/run/mysqld/mysqld.sock
