---

# Configuration dédiée au groupe de la BDD

# --- MySQL (rôle geerlingguy.mysql) ---------------------------------------
# Les mots de passe sont définis dans group_vars/devops_dev/vault.yml (chiffré)
mysql_root_password: "{{ vault_mysql_root_password }}"
mysql_databases:
  - name: fastapi_db
    encoding: utf8mb4
    collation: utf8mb4_unicode_ci

mysql_users:
  - name: fastapi_user
    host: "localhost"
    password: "{{ vault_database_app_password }}"
    priv: "fastapi_db.*:ALL"

# --- Base et utilisateur applicatif (rôle local database) -----------------
database_app_name: "fastapi_db"
database_app_user: "fastapi_user"
database_app_password: "{{ vault_database_app_password }}"
database_app_host: "localhost"
